<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before / After &amp; Annotator — screenshot tools</title>
<style>
  :root{
    --bg:#f1f5f9; --panel:#ffffff; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --accent:#4f46e5; --accent-ink:#ffffff;
    --before:#b91c1c; --before-bg:#fee2e2; --after:#15803d; --after-bg:#dcfce7;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font:15px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink);
    padding:24px;
  }
  .sub{max-width:1400px;margin:2px auto 20px;color:var(--muted)}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  .app{
    max-width:1400px;margin:0 auto;display:grid;gap:24px;
    grid-template-columns:minmax(380px,1fr) minmax(420px,1.15fr);
    align-items:start;
  }
  @media (max-width:960px){.app{grid-template-columns:1fr}}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .panel h2{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px}
  input[type=text],select{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;
    font:inherit;color:var(--ink);background:#fff;
  }
  input[type=text]:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
  .row{display:flex;gap:12px}
  .row>*{flex:1}
  .field{margin-bottom:12px}
  .field:last-child{margin-bottom:0}
  input[type=color]{width:100%;height:38px;padding:2px;border:1px solid var(--line);border-radius:9px;background:#fff}

  button{font:inherit;cursor:pointer;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 12px;font-weight:600}
  button:hover{background:#f8fafc}
  button.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  button.primary:hover{filter:brightness(1.06)}
  button.ghost{border:none;background:transparent;color:var(--muted);padding:6px 8px}
  button.ghost:hover{background:#f1f5f9;color:var(--ink)}
  button.tiny{padding:4px 8px;font-size:12px}

  .change{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
  .change-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .change-head .idx{font-size:12px;font-weight:700;color:var(--muted);background:#f1f5f9;border-radius:6px;padding:3px 8px;white-space:nowrap}
  .change-head .grow{flex:1}
  .change-head .tools{display:flex;gap:2px}

  .pair{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:12px;background:#fbfcfe}
  .pair-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .pair-head .tag{font-size:12px;font-weight:700;color:var(--muted)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .img-col .col-tag{font-size:11px;font-weight:800;letter-spacing:.05em;margin-bottom:6px;display:inline-block;padding:2px 8px;border-radius:999px}
  .img-col.before .col-tag{color:var(--before);background:var(--before-bg)}
  .img-col.after .col-tag{color:var(--after);background:var(--after-bg)}
  .slot{
    position:relative;border:2px dashed #cbd5e1;border-radius:10px;aspect-ratio:16/10;
    background:#fff center/contain no-repeat;display:flex;align-items:center;justify-content:center;
    text-align:center;color:#94a3b8;font-size:12px;padding:8px;cursor:pointer;user-select:none;
  }
  .slot.filled{border-style:solid;border-color:var(--line)}
  .slot.drag{border-color:var(--accent);background-color:#eef2ff}
  .slot.paste-target{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.18)}
  .slot .hint b{color:#64748b}
  .slot-actions{display:flex;gap:6px;margin:6px 0}
  .slot-actions button{flex:1}
  input.cap{margin-top:2px}

  .add-change{width:100%;padding:12px;border:1.5px dashed var(--line);background:#fff;color:var(--accent);font-weight:700}
  .add-change:hover{background:#eef2ff;border-color:var(--accent)}
  .add-pair{width:100%;margin-top:2px;border-style:dashed;color:var(--muted)}
  .add-change.drag,.add-pair.drag{border-color:var(--accent);background:#eef2ff;color:var(--accent)}

  .grip{cursor:grab;color:#94a3b8;font-size:15px;line-height:1;padding:2px 5px;user-select:none;border-radius:6px}
  .grip:hover{background:#f1f5f9;color:var(--ink)}
  .grip:active{cursor:grabbing}
  .change.dragging,.pair.dragging{opacity:.45}
  .change.drop-before,.pair.drop-before{box-shadow:0 -3px 0 var(--accent)}
  .change.drop-after,.pair.drop-after{box-shadow:0 3px 0 var(--accent)}

  .date-row{display:flex;align-items:center;gap:8px}
  .date-row input[type=checkbox]{width:18px;height:18px;flex:none;accent-color:var(--accent)}
  .date-row input[type=text]{flex:1}
  .doc-actions{display:flex;gap:8px}
  .doc-actions button{flex:1}

  .preview{position:sticky;top:16px}
  .preview-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  .bar-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}

  .dropdown{position:relative;display:inline-block}
  .dropdown>button .caret{margin-left:6px;font-size:10px;opacity:.7}
  .menu{
    position:absolute;top:calc(100% + 6px);right:0;min-width:170px;background:#fff;
    border:1px solid var(--line);border-radius:10px;box-shadow:0 14px 34px rgba(15,23,42,.18);
    padding:6px;display:none;z-index:50;
  }
  .dropdown.open .menu{display:block}
  .menu-head{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:8px 8px 3px;font-weight:700}
  .menu-head+.menu-item{margin-top:0}
  .menu-item{display:block;width:100%;text-align:left;border:none;background:transparent;padding:7px 10px;border-radius:7px;font-weight:600;color:var(--ink);white-space:nowrap}
  .menu-item:hover{background:#f1f5f9}

  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(10px);
    background:#0f172a;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:100;max-width:90vw;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .anno-btn{width:100%;margin-bottom:2px}
  .anno-btn:disabled{opacity:.5;cursor:not-allowed}
  .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
  .modal-backdrop.open{display:flex}
  .modal{background:#fff;border-radius:14px;max-width:96vw;max-height:96vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4)}
  .modal-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:12px 14px;border-bottom:1px solid var(--line)}
  .modal-bar .sep{width:1px;height:26px;background:var(--line);margin:0 4px}
  .tool{padding:7px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;font-weight:600;font-size:13px;color:var(--ink)}
  .tool:hover{background:#f8fafc}
  .tool.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .kbd{display:inline-block;margin-left:6px;padding:1px 5px;border-radius:5px;background:rgba(15,23,42,.08);color:var(--muted);font-size:10px;font-weight:700;line-height:1.4;vertical-align:middle}
  .tool.active .kbd{background:rgba(255,255,255,.25);color:#fff}
  .swatch{width:22px;height:22px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;padding:0}
  .swatch.active{box-shadow:0 0 0 2px var(--accent)}
  .text-pop{position:absolute;top:12px;left:12px;z-index:6;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 32px rgba(15,23,42,.22);padding:10px 12px;display:flex;flex-direction:column;gap:8px}
  .tp-row{display:flex;align-items:center;gap:9px}
  .tp-row .lbl{font-size:12px;font-weight:700;color:var(--muted);width:30px}
  .tp-swatches{display:flex;align-items:center;gap:6px}
  .chip{padding:4px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
  .chip:hover{background:#f8fafc}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .modal-canvas-wrap{position:relative;padding:16px;overflow:auto;background:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:0}
  .anno-canvas{display:block;background:#fff;border-radius:6px;box-shadow:0 4px 18px rgba(0,0,0,.15);touch-action:none}
  .anno-canvas.draw{cursor:crosshair}

  .tabs{max-width:1400px;margin:0 auto 10px;display:flex;gap:4px;border-bottom:1px solid var(--line)}
  .tab{border:none;background:transparent;padding:10px 16px;font-weight:700;color:var(--muted);border-radius:0;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{background:transparent;color:var(--ink)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .anno-page{max-width:1400px;margin:0 auto}
  .anno-drop{border:2px dashed var(--line);border-radius:14px;background:#fff;padding:64px 20px;text-align:center;color:var(--muted)}
  .anno-drop.drag{border-color:var(--accent);background:#eef2ff}
  .anno-drop-title{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:6px}
  .linkish{border:none;background:transparent;color:var(--accent);font-weight:700;padding:0;text-decoration:underline}
  .anno-editor{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .anno-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}
  .anno-input{position:absolute;z-index:5;box-sizing:border-box;border:none;border-radius:14px;padding:5px 11px;font-weight:700;font-family:inherit;line-height:1.2;color:#fff;outline:2px solid #fff;box-shadow:0 0 0 4px rgba(79,70,229,.5);width:auto;min-width:50px;resize:none;overflow:hidden;white-space:pre-wrap}
  .modal-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:12px 14px;border-top:1px solid var(--line)}
  .modal-hint{color:var(--muted);font-size:12px}
  .dims{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .canvas-wrap{
    background:
      linear-gradient(45deg,#eef2f7 25%,transparent 25%),
      linear-gradient(-45deg,#eef2f7 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#eef2f7 75%),
      linear-gradient(-45deg,transparent 75%,#eef2f7 75%);
    background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0;
    border:1px solid var(--line);border-radius:14px;padding:16px;overflow:auto;max-height:calc(100vh - 120px);
  }
  #preview{display:block;max-width:100%;height:auto;margin:0 auto;border-radius:8px;
    box-shadow:0 10px 30px rgba(15,23,42,.12)}
</style>
</head>
<body>
<h1 class="sr-only" id="modeTitle">Before / After Builder</h1>
<nav class="tabs">
  <button class="tab active" data-tab="anno">✎ Annotator</button>
  <button class="tab" data-tab="ba">◧ Before / After</button>
</nav>
<p class="sub" id="modeSub">Compose before/after screenshots into a single shareable PNG — entirely in your browser, nothing uploaded.</p>

<div id="tab-ba">
<div class="app">
  <section class="editor">
    <div class="panel">
      <div class="panel-head">
        <h2>Document</h2>
        <button id="reset" class="ghost tiny" title="Clear everything and start over">↺ Reset all</button>
      </div>
      <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" placeholder="e.g. Checkout redesign — Q2">
      </div>
      <div class="field row">
        <div>
          <label for="beforeLabel">“Before” label</label>
          <input type="text" id="beforeLabel" value="BEFORE">
        </div>
        <div>
          <label for="afterLabel">“After” label</label>
          <input type="text" id="afterLabel" value="AFTER">
        </div>
      </div>
      <div class="field row">
        <div>
          <label for="bg">Background</label>
          <input type="color" id="bg" value="#ffffff">
        </div>
        <div>
          <label for="scale">Export quality</label>
          <select id="scale">
            <option value="1">1× (standard)</option>
            <option value="2" selected>2× (crisp)</option>
            <option value="3">3× (high-res)</option>
          </select>
        </div>
      </div>
      <div class="field row">
        <div>
          <label for="layout">Layout</label>
          <select id="layout">
            <option value="vertical" selected>Vertical (top to bottom)</option>
            <option value="horizontal">Horizontal (left to right)</option>
          </select>
        </div>
        <div>
          <label for="dateText">Date / footer stamp</label>
          <div class="date-row">
            <input type="checkbox" id="dateEnabled" title="Show date / footer">
            <input type="text" id="dateText" placeholder="e.g. May 26, 2026">
          </div>
        </div>
      </div>
      <div class="field doc-actions">
        <button id="saveProject" title="Download an editable project file (images included)">💾 Save project</button>
        <button id="openProject" title="Open a previously saved project file">📂 Open project</button>
        <input type="file" id="openProjectInput" accept="application/json,.json" style="display:none">
      </div>
    </div>

    <div id="changes"></div>
    <button id="addChange" class="add-change">+ Add change</button>
  </section>

  <aside class="preview">
    <div class="preview-bar">
      <span id="dims" class="dims"></span>
      <div class="bar-actions" id="barActions"></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="preview"></canvas>
    </div>
  </aside>
</div>
</div>

<div id="tab-anno" hidden>
  <div class="anno-page">
    <div id="annoDrop" class="anno-drop">
      <div class="anno-drop-title">Annotate an image</div>
      <p>Drop an image here, paste from your clipboard, or
        <button id="annoBrowse" class="linkish">browse</button>.</p>
      <input type="file" id="annoFile" accept="image/*" hidden>
    </div>
    <div id="annoEditor" class="anno-editor" hidden></div>
    <div id="annoFoot" class="anno-foot" hidden>
      <button id="annoReplace">↻ Replace image</button>
      <div class="bar-actions" id="annoActions"></div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  // ---------- state ----------
  const uid = () => Math.random().toString(36).slice(2, 9);
  const newSlot = () => ({ caption: "", img: null, dataUrl: null, w: 0, h: 0, annotations: [], _el: null });
  const newPair = () => ({ id: uid(), before: newSlot(), after: newSlot() });
  const newChange = () => ({ id: uid(), title: "", pairs: [newPair()] });
  const todayStr = () => new Date().toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });

  const state = {
    title: "",
    beforeLabel: "BEFORE",
    afterLabel: "AFTER",
    bg: "#ffffff",
    scale: 2,
    layout: "vertical",
    dateEnabled: false,
    dateText: todayStr(),
    changes: [newChange()],
  };

  let activePaste = null; // { el, obj }

  // ---------- session persistence ----------
  const STORE_KEY = "beforeafter:v1";
  let saveTimer = null;

  function snapshot() {
    return {
      v: 1,
      title: state.title, beforeLabel: state.beforeLabel, afterLabel: state.afterLabel,
      bg: state.bg, scale: state.scale, layout: state.layout,
      dateEnabled: state.dateEnabled, dateText: state.dateText,
      changes: state.changes.map((ch) => ({
        title: ch.title,
        pairs: ch.pairs.map((p) => ({
          before: { caption: p.before.caption, dataUrl: p.before.dataUrl, annotations: p.before.annotations },
          after: { caption: p.after.caption, dataUrl: p.after.dataUrl, annotations: p.after.annotations },
        })),
      })),
      tab: currentTab,
      anno: { dataUrl: annoDoc.dataUrl, annotations: annoDoc.annotations },
    };
  }
  const serialize = () => JSON.stringify(snapshot());
  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try { sessionStorage.setItem(STORE_KEY, serialize()); }
      catch (e) { /* quota exceeded — skip persisting this update */ }
    }, 300);
  }
  function restoreSlot(d = {}) {
    const s = newSlot();
    s.caption = d.caption || "";
    s.dataUrl = d.dataUrl || null;
    s.annotations = Array.isArray(d.annotations) ? d.annotations.map((a) => ({ ...a })) : [];
    return s;
  }
  function applyState(d) {
    if (!d || !Array.isArray(d.changes)) return false;
    state.title = d.title || "";
    state.beforeLabel = d.beforeLabel != null ? d.beforeLabel : "BEFORE";
    state.afterLabel = d.afterLabel != null ? d.afterLabel : "AFTER";
    state.bg = d.bg || "#ffffff";
    state.scale = Number(d.scale) || 2;
    state.layout = (d.layout === "horizontal" || d.layout === "stacked") ? "horizontal" : "vertical";
    state.dateEnabled = !!d.dateEnabled;
    state.dateText = d.dateText != null ? d.dateText : todayStr();
    state.changes = d.changes.map((ch) => ({
      id: uid(), title: ch.title || "",
      pairs: (ch.pairs || []).map((p) => ({
        id: uid(), before: restoreSlot(p.before), after: restoreSlot(p.after),
      })),
    }));
    if (!state.changes.length) state.changes = [newChange()];
    currentTab = d.tab === "anno" ? "anno" : "ba";
    annoDoc.img = null; annoDoc.w = 0; annoDoc.h = 0;
    annoDoc.dataUrl = (d.anno && d.anno.dataUrl) || null;
    annoDoc.annotations = (d.anno && Array.isArray(d.anno.annotations)) ? d.anno.annotations.map((a) => ({ ...a })) : [];
    return true;
  }
  function loadSaved() {
    let raw;
    try { raw = sessionStorage.getItem(STORE_KEY); } catch (e) { return false; }
    if (!raw) return false;
    try { return applyState(JSON.parse(raw)); } catch (e) { return false; }
  }
  // Replace the whole document from a parsed project object, then refresh the UI.
  function loadProject(d) {
    if (!applyState(d)) { alert("That doesn't look like a valid project file."); return; }
    syncControls(); buildEditor(); hydrateImages(); drawPreview();
  }
  function hydrateImages() {
    state.changes.forEach((ch) => ch.pairs.forEach((p) => {
      [p.before, p.after].forEach((s) => {
        if (s.dataUrl && !s.img) {
          const img = new Image();
          img.onload = () => { s.img = img; s.w = img.naturalWidth; s.h = img.naturalHeight; refreshSlot(s); drawPreview(); };
          img.src = s.dataUrl;
        }
      });
    }));
  }
  function syncControls() {
    document.getElementById("title").value = state.title;
    document.getElementById("beforeLabel").value = state.beforeLabel;
    document.getElementById("afterLabel").value = state.afterLabel;
    document.getElementById("bg").value = state.bg;
    document.getElementById("scale").value = String(state.scale);
    document.getElementById("layout").value = state.layout;
    document.getElementById("dateEnabled").checked = state.dateEnabled;
    document.getElementById("dateText").value = state.dateText;
  }
  function resetAll() {
    if (!confirm("Clear everything and start over? This can't be undone.")) return;
    try { sessionStorage.removeItem(STORE_KEY); } catch (e) {}
    state.title = ""; state.beforeLabel = "BEFORE"; state.afterLabel = "AFTER";
    state.bg = "#ffffff"; state.scale = 2; state.layout = "vertical";
    state.dateEnabled = false; state.dateText = todayStr(); state.changes = [newChange()];
    syncControls(); buildEditor(); drawPreview();
  }

  // ---------- tiny DOM helper ----------
  function h(tag, attrs = {}, ...kids) {
    const e = document.createElement(tag);
    for (const k in attrs) {
      const v = attrs[k];
      if (v == null) continue;
      if (k === "class") e.className = v;
      else if (k === "style") e.style.cssText = v;
      else if (k === "html") e.innerHTML = v;
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    }
    for (const kid of kids.flat()) {
      if (kid == null || kid === false) continue;
      e.append(kid.nodeType ? kid : document.createTextNode(kid));
    }
    return e;
  }

  // ---------- image loading ----------
  function loadFile(file, slot) {
    if (!file || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = () => setSlotImage(slot, r.result);
    r.readAsDataURL(file);
  }
  const imageFiles = (fileList) => [...fileList].filter((f) => f.type.startsWith("image/"));
  const pairsNeeded = (n) => Math.max(1, Math.ceil(n / 2));

  // Drop/select N images onto one slot: first fills this slot, second fills its pair sibling.
  function assignFiles(fileList, slot, sibling) {
    const files = imageFiles(fileList);
    if (files[0]) loadFile(files[0], slot);
    if (files[1] && sibling) loadFile(files[1], sibling);
  }
  // Distribute images across pair objects: before, after, before, after...
  function fillPairs(pairs, files) {
    files.forEach((f, i) => {
      const p = pairs[Math.floor(i / 2)];
      if (p) loadFile(f, i % 2 === 0 ? p.before : p.after);
    });
  }
  // Drop onto "Add pair": create enough pairs to hold the images, then fill them.
  function dropAddPair(change, files) {
    const created = [];
    for (let i = 0; i < pairsNeeded(files.length); i++) { const p = newPair(); change.pairs.push(p); created.push(p); }
    buildEditor(); drawPreview();
    fillPairs(created, files);
  }
  // Drop onto "Add change": create a new change holding the images.
  function dropAddChange(files) {
    const ch = { id: uid(), title: "", pairs: [] };
    for (let i = 0; i < pairsNeeded(files.length); i++) ch.pairs.push(newPair());
    state.changes.push(ch);
    buildEditor(); drawPreview();
    fillPairs(ch.pairs, files);
  }
  function setSlotImage(slot, dataUrl) {
    const img = new Image();
    img.onload = () => {
      slot.img = img; slot.dataUrl = dataUrl;
      slot.w = img.naturalWidth; slot.h = img.naturalHeight;
      refreshSlot(slot);
      drawPreview();
    };
    img.src = dataUrl;
  }
  function clearSlot(slot) {
    slot.img = null; slot.dataUrl = null; slot.w = 0; slot.h = 0;
    refreshSlot(slot);
    drawPreview();
  }
  function refreshSlot(slot) {
    const el = slot._el;
    if (!el) return;
    if (slot.dataUrl) {
      el.classList.add("filled");
      el.style.backgroundImage = `url(${slot.dataUrl})`;
      el.innerHTML = "";
    } else {
      el.classList.remove("filled");
      el.style.backgroundImage = "";
      el.innerHTML = `<span class="hint"><b>Click to select</b><br>then paste, or drop / browse an image</span>`;
    }
    if (slot._annoBtn) { slot._annoBtn.disabled = !slot.img; slot._annoBtn.textContent = annoLabel(slot); }
  }
  function setPasteTarget(el, obj) {
    if (activePaste && activePaste.el) activePaste.el.classList.remove("paste-target");
    activePaste = { el, obj };
    el.classList.add("paste-target");
  }
  document.addEventListener("paste", (e) => {
    const items = (e.clipboardData && e.clipboardData.items) || [];
    if (currentTab === "anno" && !annoTextEdit) {   // paste an image into the Annotator
      for (const it of items) {
        if (it.kind === "file" && it.type.startsWith("image/")) { const f = it.getAsFile(); if (f) { loadAnnoFile(f); e.preventDefault(); } break; }
      }
      return;
    }
    if (!activePaste) return;
    for (const it of items) {
      if (it.kind === "file" && it.type.startsWith("image/")) {
        const f = it.getAsFile();
        if (f) { loadFile(f, activePaste.obj); e.preventDefault(); }
        break;
      }
    }
  });

  // ---------- editor UI ----------
  const changesRoot = document.getElementById("changes");

  function imageColumn(slot, sibling, kind, labelText) {
    const file = h("input", {
      type: "file", accept: "image/*", multiple: "", style: "display:none",
      onchange: (e) => { assignFiles(e.target.files, slot, sibling); e.target.value = ""; },
    });
    const drop = h("div", {
      class: "slot",
      onclick: () => setPasteTarget(drop, slot),
      ondragover: (e) => { e.preventDefault(); drop.classList.add("drag"); },
      ondragleave: () => drop.classList.remove("drag"),
      ondrop: (e) => {
        e.preventDefault(); drop.classList.remove("drag");
        assignFiles(e.dataTransfer.files, slot, sibling);
      },
    });
    slot._el = drop;
    refreshSlot(slot);

    const cap = h("input", {
      type: "text", class: "cap", value: slot.caption || "", placeholder: "Caption (optional)",
      oninput: (e) => { slot.caption = e.target.value; drawPreview(); },
    });

    const annoBtn = h("button", {
      class: "anno-btn tiny", disabled: slot.img ? null : "",
      title: "Draw boxes, arrows, numbers and labels on this image",
      onclick: () => openAnnotator(slot, annoBtn),
    }, annoLabel(slot));
    slot._annoBtn = annoBtn;

    return h("div", { class: `img-col ${kind}` },
      h("span", { class: "col-tag" }, labelText),
      drop, file,
      h("div", { class: "slot-actions" },
        h("button", { class: "tiny", onclick: () => file.click() }, "Browse"),
        h("button", { class: "tiny", onclick: () => clearSlot(slot) }, "Clear"),
      ),
      annoBtn,
      cap,
    );
  }

  function pairBlock(change, pair, pi) {
    const swap = () => {
      const p = change.pairs[pi];
      [p.before, p.after] = [p.after, p.before];
      buildEditor(); drawPreview();
    };
    const movePair = (dir) => {
      const j = pi + dir;
      if (j < 0 || j >= change.pairs.length) return;
      [change.pairs[pi], change.pairs[j]] = [change.pairs[j], change.pairs[pi]];
      buildEditor(); drawPreview();
    };
    const multi = change.pairs.length > 1;
    const head = h("div", { class: "pair-head" },
      h("span", { class: "tag" }, `Pair ${pi + 1}`),
      h("div", { class: "tools" },
        multi ? h("button", { class: "ghost tiny", title: "Move pair up", onclick: () => movePair(-1) }, "↑") : null,
        multi ? h("button", { class: "ghost tiny", title: "Move pair down", onclick: () => movePair(1) }, "↓") : null,
        h("button", { class: "ghost tiny", title: "Swap before and after", onclick: swap }, "⇄ Swap"),
        multi
          ? h("button", { class: "ghost tiny", onclick: () => { change.pairs.splice(pi, 1); buildEditor(); drawPreview(); } }, "Remove pair")
          : null,
      ),
    );
    return h("div", { class: "pair" },
      head,
      h("div", { class: "cols" },
        imageColumn(pair.before, pair.after, "before", state.beforeLabel || "Before"),
        imageColumn(pair.after, pair.before, "after", state.afterLabel || "After"),
      ),
    );
  }

  function changeBlock(change, ci) {
    const titleInput = h("input", {
      type: "text", value: change.title || "", placeholder: `Change ${ci + 1} title (e.g. Navigation bar)`,
      oninput: (e) => { change.title = e.target.value; drawPreview(); },
    });

    const move = (dir) => {
      const j = ci + dir;
      if (j < 0 || j >= state.changes.length) return;
      [state.changes[ci], state.changes[j]] = [state.changes[j], state.changes[ci]];
      buildEditor(); drawPreview();
    };

    const head = h("div", { class: "change-head" },
      h("span", { class: "idx" }, `#${ci + 1}`),
      h("div", { class: "grow" }, titleInput),
      h("div", { class: "tools" },
        h("button", { class: "ghost tiny", title: "Move up", onclick: () => move(-1) }, "↑"),
        h("button", { class: "ghost tiny", title: "Move down", onclick: () => move(1) }, "↓"),
        dropdown("⧉ Copy", "ghost tiny", [{ items: copyItems(() => "", () => [change]) }]),
        dropdown("⬇ Download", "ghost tiny", [{ items: downloadItems(() => slug(change.title || "change"), () => "", () => [change]) }]),
        state.changes.length > 1
          ? h("button", { class: "ghost tiny", title: "Delete change", onclick: () => { state.changes.splice(ci, 1); buildEditor(); drawPreview(); } }, "✕")
          : null,
      ),
    );

    const pairs = h("div", {}, change.pairs.map((p, pi) => pairBlock(change, p, pi)));
    const addPair = h("button", {
      class: "add-pair",
      onclick: () => { change.pairs.push(newPair()); buildEditor(); drawPreview(); },
      ondragover: (e) => { e.preventDefault(); addPair.classList.add("drag"); },
      ondragleave: () => addPair.classList.remove("drag"),
      ondrop: (e) => {
        e.preventDefault(); addPair.classList.remove("drag");
        const files = imageFiles(e.dataTransfer.files);
        if (files.length) dropAddPair(change, files);
      },
    }, "+ Add before/after pair");

    return h("div", { class: "change" }, head, pairs, addPair);
  }

  function buildEditor() {
    activePaste = null;
    changesRoot.innerHTML = "";
    state.changes.forEach((ch, ci) => changesRoot.append(changeBlock(ch, ci)));
  }

  // ---------- layout + canvas rendering ----------
  const meas = document.createElement("canvas").getContext("2d");
  const FAMILY = `system-ui,-apple-system,"Segoe UI",Roboto,sans-serif`;
  const SVG_FAM = FAMILY.replace(/"/g, "'");
  const font = (weight, size) => `${weight} ${size}px ${FAMILY}`;

  function wrap(text, f, maxW) {
    meas.font = f;
    const out = [];
    String(text).split("\n").forEach((para) => {
      const words = para.split(/\s+/).filter(Boolean);
      if (!words.length) { out.push(""); return; }
      let line = words[0];
      for (let i = 1; i < words.length; i++) {
        const t = line + " " + words[i];
        if (meas.measureText(t).width > maxW) { out.push(line); line = words[i]; }
        else line = t;
      }
      out.push(line);
    });
    return out;
  }

  function rr(ctx, x, y, w, h_, r) {
    r = Math.min(r, w / 2, h_ / 2);
    ctx.beginPath();
    if (ctx.roundRect) { ctx.roundRect(x, y, w, h_, r); return; }
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h_, r);
    ctx.arcTo(x + w, y + h_, x, y + h_, r);
    ctx.arcTo(x, y + h_, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  const C = {
    PAD: 48, TITLE: 52, CHANGE: 34, LABEL: 22, CAP: 19,
    cellW: 560, pairGap: 36, rowGap: 40, changeGap: 60, titleGap: 40,
    ctitleGap: 24, labelGap: 14, capGap: 14, maxImgH: 680, lh: 1.3, radius: 10,
    stackGap: 28,
  };

  // Lay out one before/after image into a column `cw` wide, anchored at (x, y). Returns its height.
  function blockLayout(slot, labelText, bg, fg, x, y, cw, items) {
    const natW = (slot.img && slot.w) ? slot.w : cw;
    const natH = (slot.img && slot.h) ? slot.h : Math.round(cw * 0.6);
    // expand the drawn region to fit any annotations that extend outside the image
    nbAspect = natH ? natW / natH : 1;
    const ext = slot.img ? annsExtent(slot.annotations || []) : { x0: 0, y0: 0, x1: 1, y1: 1 };
    const regWu = ext.x1 - ext.x0, regHu = ext.y1 - ext.y0;
    let s = cw / (regWu * natW);
    if (regHu * natH * s > C.maxImgH) s = C.maxImgH / (regHu * natH);
    const regionW = regWu * natW * s, regionH = regHu * natH * s;
    const unitX = natW * s, unitY = natH * s;
    const regionX = x + (cw - regionW) / 2;

    meas.font = font(700, C.LABEL);
    const tw = meas.measureText(labelText).width;
    const badgeH = C.LABEL + 16, badgeW = tw + 28;

    let cy = y;
    items.push({ kind: "badge", cx: x + cw / 2, y: cy, w: badgeW, h: badgeH, text: labelText, size: C.LABEL, bg, fg });
    cy += badgeH + C.labelGap;
    // image occupies normalized [0,1] within the (possibly larger) region
    items.push({ kind: "image", img: slot.img, x: regionX + (0 - ext.x0) * unitX, y: cy + (0 - ext.y0) * unitY, w: unitX, h: unitY, annotations: slot.annotations });
    cy += regionH;
    if ((slot.caption || "").trim()) {
      cy += C.capGap;
      const lines = wrap(slot.caption, font(400, C.CAP), cw);
      items.push({ kind: "text", lines, x: x + cw / 2, y: cy, size: C.CAP, weight: 400, color: "#475569", align: "center" });
      cy += lines.length * C.CAP * C.lh;
    }
    return cy - y;
  }

  function computeLayout(title, changes) {
    const horiz = state.layout === "horizontal";
    const bLabel = state.beforeLabel || "BEFORE", aLabel = state.afterLabel || "AFTER";
    const colW = C.cellW;
    const items = [];
    // width of one change rendered as side-by-side columns (one column per pair)
    const changeColsW = (ch) => Math.max(colW, ch.pairs.length * colW + (ch.pairs.length - 1) * C.pairGap);
    const contentW = horiz
      ? Math.max(colW, changes.reduce((s, ch, i) => s + changeColsW(ch) + (i ? C.changeGap : 0), 0))
      : colW * 2 + C.pairGap;
    const W = contentW + C.PAD * 2;
    let y = C.PAD;

    if ((title || "").trim()) {
      const lines = wrap(title, font(800, C.TITLE), contentW);
      items.push({ kind: "text", lines, x: C.PAD + contentW / 2, y, size: C.TITLE, weight: 800, color: "#0f172a", align: "center" });
      y += lines.length * C.TITLE * C.lh + C.titleGap;
    }

    // change title + divider at (x, y0) spanning width w; returns height consumed
    const titleBlock = (ch, x, y0, w) => {
      if (!(ch.title || "").trim()) return 0;
      const lines = wrap(ch.title, font(700, C.CHANGE), w);
      items.push({ kind: "text", lines, x, y: y0, size: C.CHANGE, weight: 700, color: "#0f172a", align: "left" });
      const h = lines.length * C.CHANGE * C.lh + 10;
      items.push({ kind: "line", x1: x, x2: x + w, y: y0 + h, color: "#e2e8f0", width: 2 });
      return h + C.ctitleGap;
    };
    // a change's pairs as vertical before/after columns, side by side; returns height
    const columns = (ch, x, y0) => {
      const colX = (pi) => x + pi * (colW + C.pairGap);
      const bH = ch.pairs.map((p, pi) => blockLayout(p.before, bLabel, "#fee2e2", "#b91c1c", colX(pi), y0, colW, items));
      const aY = y0 + Math.max(0, ...bH) + C.stackGap;
      const aH = ch.pairs.map((p, pi) => blockLayout(p.after, aLabel, "#dcfce7", "#15803d", colX(pi), aY, colW, items));
      return aY + Math.max(0, ...aH) - y0;
    };

    if (horiz) {
      // everything flows left-to-right: changes side by side, each a grid of vertical pairs
      const topY = y; let maxH = 0, x = C.PAD;
      changes.forEach((ch, i) => {
        if (i) x += C.changeGap;
        const bw = changeColsW(ch);
        const th = titleBlock(ch, x, topY, bw);
        maxH = Math.max(maxH, th + columns(ch, x, topY + th));
        x += bw;
      });
      y = topY + maxH;
    } else {
      // everything flows top-to-bottom: changes stacked, each pair a before|after row
      changes.forEach((ch, idx) => {
        if (idx > 0) y += C.changeGap;
        y += titleBlock(ch, C.PAD, y, contentW);
        ch.pairs.forEach((p, pi) => {
          if (pi > 0) y += C.rowGap;
          const bh = blockLayout(p.before, bLabel, "#fee2e2", "#b91c1c", C.PAD, y, colW, items);
          const ah = blockLayout(p.after, aLabel, "#dcfce7", "#15803d", C.PAD + colW + C.pairGap, y, colW, items);
          y += Math.max(bh, ah);
        });
      });
    }

    if (state.dateEnabled && (state.dateText || "").trim()) {
      y += C.changeGap / 2;
      const lines = wrap(state.dateText, font(500, 20), contentW);
      items.push({ kind: "text", lines, x: C.PAD + contentW, y, size: 20, weight: 500, color: "#94a3b8", align: "right" });
      y += lines.length * 20 * C.lh;
    }

    if (!items.length) {
      items.push({ kind: "text", lines: ["Add a title and screenshots to build your preview"], x: W / 2, y: C.PAD, size: 22, weight: 500, color: "#94a3b8", align: "center" });
      y += 30;
    }

    y += C.PAD;
    return { W, H: y, items };
  }

  function draw(ctx, items, S, bg, W, H) {
    ctx.setTransform(S, 0, 0, S, 0, 0);
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    ctx.textBaseline = "top";
    for (const it of items) {
      if (it.kind === "text") {
        ctx.font = font(it.weight, it.size);
        ctx.fillStyle = it.color;
        ctx.textAlign = it.align;
        const lh = it.size * C.lh;
        it.lines.forEach((ln, i) => ctx.fillText(ln, it.x, it.y + i * lh));
      } else if (it.kind === "line") {
        ctx.strokeStyle = it.color; ctx.lineWidth = it.width;
        ctx.beginPath(); ctx.moveTo(it.x1, it.y); ctx.lineTo(it.x2, it.y); ctx.stroke();
      } else if (it.kind === "badge") {
        rr(ctx, it.cx - it.w / 2, it.y, it.w, it.h, it.h / 2);
        ctx.fillStyle = it.bg; ctx.fill();
        ctx.font = font(700, it.size); ctx.fillStyle = it.fg;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(it.text, it.cx, it.y + it.h / 2 + 1);
        ctx.textBaseline = "top";
      } else if (it.kind === "image") {
        if (it.img) {
          ctx.save(); rr(ctx, it.x, it.y, it.w, it.h, C.radius); ctx.clip();
          ctx.drawImage(it.img, it.x, it.y, it.w, it.h); ctx.restore();
          ctx.save(); rr(ctx, it.x, it.y, it.w, it.h, C.radius);
          ctx.strokeStyle = "rgba(15,23,42,.12)"; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();
          drawAnnotations(ctx, { x: it.x, y: it.y, w: it.w, h: it.h }, it.annotations);
        } else {
          ctx.save(); rr(ctx, it.x, it.y, it.w, it.h, C.radius);
          ctx.fillStyle = "#f1f5f9"; ctx.fill();
          ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 2; ctx.setLineDash([8, 6]); ctx.stroke();
          ctx.restore();
          ctx.fillStyle = "#94a3b8"; ctx.font = font(500, 18);
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("No image", it.x + it.w / 2, it.y + it.h / 2);
          ctx.textBaseline = "top";
        }
      }
    }
  }

  function renderModel(canvas, title, changes) {
    const S = state.scale;
    const { W, H, items } = computeLayout(title, changes);
    canvas.width = Math.max(1, Math.round(W * S));
    canvas.height = Math.max(1, Math.round(H * S));
    draw(canvas.getContext("2d"), items, S, state.bg, W, H);
    return { W, H, S };
  }

  // ---------- preview + export ----------
  const previewCanvas = document.getElementById("preview");
  const dimsEl = document.getElementById("dims");

  function drawPreview() {
    const { W, H, S } = renderModel(previewCanvas, state.title, state.changes);
    dimsEl.textContent = `${Math.round(W * S)} × ${Math.round(H * S)} px`;
    scheduleSave();
  }

  function slug(s) {
    return (String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "")) || "before-after";
  }
  const RASTER = { png: "image/png", jpeg: "image/jpeg", webp: "image/webp" };
  const EXT = { png: "png", jpeg: "jpg", webp: "webp", svg: "svg" };

  function downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = h("a", { href: url, download: name });
    document.body.append(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  let toastTimer = null;
  function toast(msg) {
    let t = document.getElementById("toast");
    if (!t) { t = h("div", { id: "toast", class: "toast" }); document.body.append(t); }
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 1700);
  }
  function toCanvas(title, changes) {
    const tmp = document.createElement("canvas");
    renderModel(tmp, title, changes);
    return tmp;
  }
  const blobFromCanvas = (canvas, mime, q) =>
    new Promise((res, rej) => canvas.toBlob((b) => (b ? res(b) : rej(new Error("toBlob failed"))), mime, q));

  function exportDownload(title, changes, fmt, name) {
    if (fmt === "svg") {
      downloadBlob(new Blob([buildSVG(title, changes)], { type: "image/svg+xml" }), `${name}.svg`);
      return;
    }
    blobFromCanvas(toCanvas(title, changes), RASTER[fmt], fmt === "png" ? undefined : 0.92)
      .then((b) => downloadBlob(b, `${name}.${EXT[fmt]}`));
  }
  async function exportCopy(title, changes, fmt) {
    try {
      if (fmt === "svg") { await navigator.clipboard.writeText(buildSVG(title, changes)); toast("Copied SVG markup"); return; }
      const blob = await blobFromCanvas(toCanvas(title, changes), RASTER[fmt], fmt === "png" ? undefined : 0.92);
      await navigator.clipboard.write([new ClipboardItem({ [RASTER[fmt]]: blob })]);
      toast(`Copied ${fmt.toUpperCase()} to clipboard`);
    } catch (e) {
      toast(fmt === "png" ? "Copy failed" : "Copy failed — browser may only allow PNG");
    }
  }
  function downloadAllSections(fmt) {
    if (!state.changes.length) return;
    // Stagger so the browser doesn't drop all-but-one of the saves.
    state.changes.forEach((ch, i) => {
      setTimeout(() => exportDownload("", [ch], fmt, `${i + 1}-${slug(ch.title || "change")}`), i * 350);
    });
  }

  // ---- SVG export (reuses the same layout; vector text, embedded raster images) ----
  const svgEsc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  function buildSVG(title, changes) {
    const { W, H, items } = computeLayout(title, changes);
    const fam = FAMILY.replace(/"/g, "'");
    const out = [
      `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`,
      `<rect width="${W}" height="${H}" fill="${state.bg}"/>`,
    ];
    let clip = 0;
    for (const it of items) {
      if (it.kind === "text") {
        const anchor = it.align === "center" ? "middle" : it.align === "right" ? "end" : "start";
        const lh = it.size * C.lh;
        it.lines.forEach((ln, i) => out.push(
          `<text x="${it.x}" y="${it.y + i * lh}" font-family="${fam}" font-size="${it.size}" font-weight="${it.weight}" fill="${it.color}" text-anchor="${anchor}" dominant-baseline="text-before-edge">${svgEsc(ln)}</text>`));
      } else if (it.kind === "line") {
        out.push(`<line x1="${it.x1}" y1="${it.y}" x2="${it.x2}" y2="${it.y}" stroke="${it.color}" stroke-width="${it.width}"/>`);
      } else if (it.kind === "badge") {
        out.push(`<rect x="${it.cx - it.w / 2}" y="${it.y}" width="${it.w}" height="${it.h}" rx="${it.h / 2}" fill="${it.bg}"/>`);
        out.push(`<text x="${it.cx}" y="${it.y + it.h / 2}" font-family="${fam}" font-size="${it.size}" font-weight="700" fill="${it.fg}" text-anchor="middle" dominant-baseline="central">${svgEsc(it.text)}</text>`);
      } else if (it.kind === "image" && it.img && it.img.src) {
        const id = `c${clip++}`;
        out.push(`<clipPath id="${id}"><rect x="${it.x}" y="${it.y}" width="${it.w}" height="${it.h}" rx="${C.radius}"/></clipPath>`);
        out.push(`<image x="${it.x}" y="${it.y}" width="${it.w}" height="${it.h}" preserveAspectRatio="none" clip-path="url(#${id})" xlink:href="${it.img.src}"/>`);
        out.push(`<rect x="${it.x}" y="${it.y}" width="${it.w}" height="${it.h}" rx="${C.radius}" fill="none" stroke="rgba(15,23,42,0.12)" stroke-width="1.5"/>`);

  // ----- handles for the single selected annotation -----

  // ----- pinning helpers -----

  // ----- gesture start from a handle -----

  function computeBand() {

  // Build the shared editor chrome (toolbar + canvas + inline text input), wired to the shared
  // handlers which read/write the active `editorHost`. Used by both the modal and the inline tab.
  function makeEditorUI() {
    const canvas = h("canvas", { class: "anno-canvas" });
    const input = h("textarea", { class: "anno-input", rows: "1", style: "display:none" });
    input.addEventListener("keydown", (e) => {
      e.stopPropagation();   // Enter commits; Shift+Enter adds a newline; Escape cancels
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); commitTextEdit(); }
      else if (e.key === "Escape") { e.preventDefault(); cancelTextEdit(); }

    input.addEventListener("blur", () => { if (annoTextEdit) commitTextEdit(); });
    const toolBtns = {};
    const toolbar = h("div", { class: "modal-bar" });
    TOOLS.forEach(([id, label, key]) => {
      const b = h("button", { class: "tool", title: `${id} (${key})`, onclick: () => setTool(id) }, label, h("span", { class: "kbd" }, key));
      toolBtns[id] = b; toolbar.append(b);

    toolbar.append(h("span", { class: "sep" }));

    const swatchEls = [], fgSwatches = [], bgSwatches = [];
    const globalSwatches = h("div", { class: "tp-swatches" });

      const s = h("button", { class: "swatch", style: `background:${c}`, title: c, onclick: () => { annoColor = c; const idx = selArr().filter((i) => annoWork[i] && annoWork[i].type !== "text"); if (idx.length) { idx.forEach((i) => (annoWork[i].color = c)); pushHistory(); } updateColors(); redraw(); } });
      s._c = c; swatchEls.push(s); globalSwatches.append(s);
    });
    const globalRow = h("div", { class: "tp-row" }, h("span", { class: "lbl" }, "Color"), globalSwatches);
    const colorRow = (label, prop, special, specialLabel, store) => {
      const swatches = h("div", { class: "tp-swatches" });
      const chip = h("button", { class: "chip", title: special === "auto" ? "Auto (contrasts the fill)" : "No background", onclick: () => applyText(prop, special) }, specialLabel);
      chip._c = special; store.push(chip); swatches.append(chip);
      COLORS.forEach((c) => { const s = h("button", { class: "swatch", style: `background:${c}`, title: c, onclick: () => applyText(prop, c) }); s._c = c; store.push(s); swatches.append(s); });
      return h("div", { class: "tp-row" }, h("span", { class: "lbl" }, label), swatches);
    };
    const fgRow = colorRow("Text", "fg", "auto", "Auto", fgSwatches);
    const bgRow = colorRow("Fill", "bg", "none", "None", bgSwatches);
    const textPop = h("div", { class: "text-pop" }, globalRow, fgRow, bgRow);
    const undoBtn = h("button", { class: "tool", title: "Undo", onclick: undo }, "↶ Undo", h("span", { class: "kbd" }, "⌘Z"));
    const redoBtn = h("button", { class: "tool", title: "Redo", onclick: redo }, "↷ Redo", h("span", { class: "kbd" }, "⌘⇧Z"));
    const delBtn = h("button", { class: "tool", title: "Delete selected", onclick: deleteSel }, "🗑 Delete", h("span", { class: "kbd" }, "Del"));
    const clrBtn = h("button", { class: "tool", onclick: clearAnno }, "Clear all");
    const zoomOutBtn = h("button", { class: "tool", title: "Zoom out", onclick: () => zoomBy(1 / 1.25) }, "−");
    const fitBtn = h("button", { class: "tool", title: "Fit image to view", onclick: () => { fitView(); redraw(); } }, "⤢ Fit");
    const zoomInBtn = h("button", { class: "tool", title: "Zoom in", onclick: () => zoomBy(1.25) }, "+");
    toolbar.append(undoBtn, redoBtn, delBtn, clrBtn, h("span", { class: "sep" }), zoomOutBtn, fitBtn, zoomInBtn);

    canvas.addEventListener("wheel", onAnnoWheel, { passive: false });

      if (annoTool !== "select") return;
      const { dx, dy } = evtPos(e);
      for (let i = annoWork.length - 1; i >= 0; i--) { if (annoWork[i].type === "text" && annoHit(annoWork[i], dx, dy)) { setSel([i]); startTextEdit(i, false); redraw(); return; } }
    });
    return { canvas, input, toolbar, toolBtns, swatchEls, textPop, globalRow, fgRow, bgRow, fgSwatches, bgSwatches, undoBtn, redoBtn, delBtn, ctx: canvas.getContext("2d") };

  function ensureModal() {

      h("span", { class: "modal-hint" }, "scroll to pan · ⌃scroll / pinch to zoom · space-drag to pan · drag to draw or box-select · double-click a label to edit"),
      h("div", { style: "display:flex;gap:8px" },
        h("button", { onclick: () => closeAnnotator(false) }, "Cancel"),
        h("button", { class: "primary", onclick: () => closeAnnotator(true) }, "Done"),
      ),
    );
    const modal = h("div", { class: "modal" }, ui.toolbar, h("div", { class: "modal-canvas-wrap" }, ui.canvas, ui.input, ui.textPop), foot);
    const backdrop = h("div", { class: "modal-backdrop", onclick: (e) => { if (e.target === backdrop) closeAnnotator(false); } }, modal);
    document.body.append(backdrop);
    modalEls = Object.assign({ mode: "modal", backdrop }, ui);
    return modalEls;
  }
  function ensureInline() {
    if (inlineEls) return inlineEls;
    const ui = makeEditorUI();
    document.getElementById("annoEditor").append(ui.toolbar, h("div", { class: "modal-canvas-wrap", style: "border-radius:14px" }, ui.canvas, ui.input, ui.textPop));
    inlineEls = Object.assign({ mode: "inline", live: true }, ui);
    return inlineEls;
  }

  // The editor is a fixed-size viewport onto an infinite plane. annoImgRect is the image's
  // on-screen rect, so panning translates it and zooming scales it about a point. Annotations
  // (normalized to the image) map through annoImgRect, so they pan/zoom with it for free.
  function setViewport() {
    const m = editorHost;
    annoDispW = Math.round(Math.min(window.innerWidth - 80, 1100));
    annoDispH = Math.round(window.innerHeight * 0.62);
    annoDPR = window.devicePixelRatio || 1;
    m.canvas.width = annoDispW * annoDPR; m.canvas.height = annoDispH * annoDPR;
    m.canvas.style.width = annoDispW + "px"; m.canvas.style.height = annoDispH + "px";
  }
  function fitView() {
    const s = Math.min(annoDispW / annoSlot.w, annoDispH / annoSlot.h) * 0.7;   // 70% leaves room to draw outside
    const w = annoSlot.w * s, h = annoSlot.h * s;
    annoImgRect = { x: (annoDispW - w) / 2, y: (annoDispH - h) / 2, w, h };
  }
  function zoomAt(cx, cy, f) {
    const nw = Math.max(60, Math.min(40000, annoImgRect.w * f)), rf = nw / annoImgRect.w;
    const nx = (cx - annoImgRect.x) / annoImgRect.w, ny = (cy - annoImgRect.y) / annoImgRect.h;
    annoImgRect.w *= rf; annoImgRect.h *= rf;
    annoImgRect.x = cx - nx * annoImgRect.w; annoImgRect.y = cy - ny * annoImgRect.h;
  }
  function zoomBy(f) { zoomAt(annoDispW / 2, annoDispH / 2, f); redraw(); }
  function onAnnoWheel(e) {
    e.preventDefault();
    const r = editorHost.canvas.getBoundingClientRect();
    if (e.ctrlKey) zoomAt(e.clientX - r.left, e.clientY - r.top, Math.exp(-e.deltaY * 0.01));  // pinch / ⌃scroll
    else { annoImgRect.x -= e.deltaX; annoImgRect.y -= e.deltaY; }                              // two-finger / wheel pan
    redraw();
  }

  // shared setup for either host
  function startEditing(slot) {
    annoSlot = slot;
    annoWork = cloneAnns(slot.annotations); annoWork.forEach((a) => { if (!a.id) a.id = uid(); });
    annoTool = "select"; annoColor = "#ef4444"; annoTextBg = "none"; setSel([]); annoDraft = null; annoAction = null; annoTextEdit = null; annoSpace = false;
    annoHist = []; annoHistIdx = -1; pushHistory();
    setViewport(); fitView();
    editorHost.input.style.display = "none";
    updateToolbar(); updateColors(); updateUndoRedo(); redraw();
  }
  function openAnnotator(slot, btn) {   // modal (Before/After "Annotate")
    if (!slot.img) return;
    editorHost = ensureModal(); annoBtnRef = btn;
    startEditing(slot);
    editorHost.backdrop.classList.add("open");
  }
  function closeAnnotator(commit) {
    if (!modalEls) return;
    if (annoTextEdit) commitTextEdit();
    modalEls.backdrop.classList.remove("open");
    if (commit && annoSlot) {
      annoSlot.annotations = annoWork;
      if (annoBtnRef) annoBtnRef.textContent = annoLabel(annoSlot);
      drawPreview();
    }
    annoSlot = null; annoBtnRef = null; editorHost = null;
  }
  function openInline() {               // Annotator tab (live editing)
    if (!annoDoc.img) return;
    editorHost = ensureInline(); annoBtnRef = null;
    startEditing(annoDoc);
  }
  // in the inline tab, edits apply to the document immediately (no Done step)
  function commitLive() { if (editorHost && editorHost.live && annoSlot) { annoSlot.annotations = cloneAnns(annoWork); scheduleSave(); } }

  document.addEventListener("keydown", (e) => {
    if (!editorHost || annoTextEdit) return;
    if (e.key === "Escape") { editorHost.mode === "modal" ? closeAnnotator(false) : (setSel([]), redraw()); }
    else if (e.key === "Enter") { if (editorHost.mode === "modal") closeAnnotator(true); }
    else if (e.key === "Delete" || e.key === "Backspace") { e.preventDefault(); deleteSel(); }
    else if ((e.metaKey || e.ctrlKey) && (e.key === "z" || e.key === "Z")) { e.preventDefault(); e.shiftKey ? redo() : undo(); }
    else if ((e.metaKey || e.ctrlKey) && (e.key === "y" || e.key === "Y")) { e.preventDefault(); redo(); }
    else if (e.key >= "1" && e.key <= "5" && !e.metaKey && !e.ctrlKey) { e.preventDefault(); setTool(TOOL_KEYS[+e.key - 1]); }
    else if (e.key === " ") { e.preventDefault(); annoSpace = true; if (document.activeElement && document.activeElement.blur) document.activeElement.blur(); editorHost.canvas.style.cursor = "grab"; }
  });
  document.addEventListener("keyup", (e) => {
    if (e.key === " " && annoSpace) { annoSpace = false; if (editorHost && (!annoAction || annoAction.kind !== "pan")) editorHost.canvas.style.cursor = ""; }
  });

  // ---------- Annotator tab ----------
  function setAnnoImage(dataUrl) {
    const img = new Image();
    img.onload = () => { annoDoc.img = img; annoDoc.dataUrl = dataUrl; annoDoc.w = img.naturalWidth; annoDoc.h = img.naturalHeight; if (currentTab === "anno") enterAnnotator(); scheduleSave(); };
    img.src = dataUrl;
  }
  function loadAnnoFile(file) { if (!file || !file.type.startsWith("image/")) return; const r = new FileReader(); r.onload = () => setAnnoImage(r.result); r.readAsDataURL(file); }
  function enterAnnotator() {
    const hasImg = !!annoDoc.img;
    document.getElementById("annoDrop").hidden = hasImg;
    document.getElementById("annoEditor").hidden = !hasImg;
    document.getElementById("annoFoot").hidden = !hasImg;
    if (hasImg) openInline(); else editorHost = null;
  }
  function leaveAnnotator() { if (annoTextEdit) commitTextEdit(); if (editorHost && editorHost.mode === "inline") editorHost = null; }
  const TAB_INFO = {
    ba: { title: "Before / After Builder", sub: "Compose before/after screenshots into a single shareable PNG — entirely in your browser, nothing uploaded." },
    anno: { title: "Annotator", sub: "Annotate a screenshot with boxes, arrows, numbers and labels, then export it — entirely in your browser, nothing uploaded." },
  };
  // ---------- hash routing: each tool gets its own URL (#/before-after, #/annotator) ----------
  const TAB_SLUG = { ba: "before-after", anno: "annotator" };
  const slugToTab = (s) => (s === "annotator" ? "anno" : s === "before-after" ? "ba" : null);
  const tabFromHash = () => slugToTab(location.hash.replace(/^#\/?/, ""));
  // Navigate to a tab by updating the URL; the hashchange listener applies it (so back/forward work).
  function navTo(t) {
    const want = "#/" + TAB_SLUG[t === "anno" ? "anno" : "ba"];
    if (location.hash === want) showTab(t);   // hash already correct → no hashchange fires, apply directly
    else location.hash = want;                // changing the hash triggers hashchange → showTab
  }
  function showTab(t) {
    currentTab = t === "anno" ? "anno" : "ba";
    document.getElementById("tab-ba").hidden = currentTab !== "ba";
    document.getElementById("tab-anno").hidden = currentTab !== "anno";
    document.querySelectorAll(".tab").forEach((b) => b.classList.toggle("active", b.dataset.tab === currentTab));
    document.getElementById("modeTitle").textContent = TAB_INFO[currentTab].title;
    document.getElementById("modeSub").textContent = TAB_INFO[currentTab].sub;
    currentTab === "anno" ? enterAnnotator() : leaveAnnotator();
    scheduleSave();
  }

  // ---- Annotator export: the single image with annotations baked in ----
  function annotatedCanvas(fmt) {
    const slot = annoDoc, S = 2;
    nbAspect = slot.h ? slot.w / slot.h : 1;
    const ext = annsExtent(slot.annotations);
    const W = (ext.x1 - ext.x0) * slot.w, H = (ext.y1 - ext.y0) * slot.h;
    const cv = document.createElement("canvas");
    cv.width = Math.max(1, Math.round(W * S)); cv.height = Math.max(1, Math.round(H * S));
    const ctx = cv.getContext("2d"); ctx.setTransform(S, 0, 0, S, 0, 0);
    if (fmt !== "png") { ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H); }   // jpeg/webp need an opaque bg
    const ix = (0 - ext.x0) * slot.w, iy = (0 - ext.y0) * slot.h;
    ctx.drawImage(slot.img, ix, iy, slot.w, slot.h);
    drawAnnotations(ctx, { x: ix, y: iy, w: slot.w, h: slot.h }, slot.annotations);
    return cv;
  }
  function annotatedSVG() {
    const slot = annoDoc;
    nbAspect = slot.h ? slot.w / slot.h : 1;
    const ext = annsExtent(slot.annotations);
    const W = (ext.x1 - ext.x0) * slot.w, H = (ext.y1 - ext.y0) * slot.h;
    const ix = (0 - ext.x0) * slot.w, iy = (0 - ext.y0) * slot.h;
    const rect = { x: ix, y: iy, w: slot.w, h: slot.h }, byId = buildById(slot.annotations);
    const out = [`<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`];
    out.push(`<image x="${ix}" y="${iy}" width="${slot.w}" height="${slot.h}" preserveAspectRatio="none" xlink:href="${slot.img.src}"/>`);
    drawOrder(slot.annotations).forEach((i) => annoPrimitives(rect, resolveForRender(slot.annotations[i], byId)).forEach((p) => out.push(svgPrim(p))));
    out.push("</svg>");
    return out.join("");
  }
  function annoExportDownload(fmt) {
    if (!annoDoc.img) return;
    if (fmt === "svg") { downloadBlob(new Blob([annotatedSVG()], { type: "image/svg+xml" }), "annotated.svg"); return; }
    annotatedCanvas(fmt).toBlob((b) => b && downloadBlob(b, `annotated.${EXT[fmt]}`), RASTER[fmt], fmt === "png" ? undefined : 0.92);
  }
  async function annoExportCopy(fmt) {
    if (!annoDoc.img) return;
    try {
      if (fmt === "svg") { await navigator.clipboard.writeText(annotatedSVG()); toast("Copied SVG markup"); return; }
      const blob = await blobFromCanvas(annotatedCanvas(fmt), RASTER[fmt], fmt === "png" ? undefined : 0.92);
      await navigator.clipboard.write([new ClipboardItem({ [RASTER[fmt]]: blob })]);
      toast(`Copied ${fmt.toUpperCase()} to clipboard`);
    } catch (e) { toast(fmt === "png" ? "Copy failed" : "Copy failed — browser may only allow PNG"); }
  }
  function buildAnnoActions() {
    const bar = document.getElementById("annoActions"); bar.innerHTML = "";
    bar.append(
      dropdown("⧉ Copy", "", [{ items: COPY_FORMATS.map(([f, l]) => ({ label: l, onClick: () => annoExportCopy(f) })) }]),
      dropdown("⬇ Download", "primary", [{ items: DL_FORMATS.map(([f, l]) => ({ label: l, onClick: () => annoExportDownload(f) })) }]),
    );
  }
  function hydrateAnno() {
    if (annoDoc.dataUrl && !annoDoc.img) {
      const img = new Image();
      img.onload = () => { annoDoc.img = img; annoDoc.w = img.naturalWidth; annoDoc.h = img.naturalHeight; if (currentTab === "anno") enterAnnotator(); };
      img.src = annoDoc.dataUrl;
    }
  }

  // ---------- global controls ----------
  const bind = (id, fn) => document.getElementById(id).addEventListener("input", fn);
  bind("title", (e) => { state.title = e.target.value; drawPreview(); });
  bind("beforeLabel", (e) => { state.beforeLabel = e.target.value; updateColTags(); drawPreview(); });
  bind("afterLabel", (e) => { state.afterLabel = e.target.value; updateColTags(); drawPreview(); });
  bind("bg", (e) => { state.bg = e.target.value; drawPreview(); });
  bind("scale", (e) => { state.scale = Number(e.target.value); drawPreview(); });
  bind("layout", (e) => { state.layout = e.target.value; drawPreview(); });
  document.getElementById("dateEnabled").addEventListener("change", (e) => { state.dateEnabled = e.target.checked; drawPreview(); });
  bind("dateText", (e) => { state.dateText = e.target.value; drawPreview(); });
  const addChangeBtn = document.getElementById("addChange");
  addChangeBtn.addEventListener("click", () => { state.changes.push(newChange()); buildEditor(); drawPreview(); });
  addChangeBtn.addEventListener("dragover", (e) => { e.preventDefault(); addChangeBtn.classList.add("drag"); });
  addChangeBtn.addEventListener("dragleave", () => addChangeBtn.classList.remove("drag"));
  addChangeBtn.addEventListener("drop", (e) => {
    e.preventDefault(); addChangeBtn.classList.remove("drag");
    const files = imageFiles(e.dataTransfer.files);
    if (files.length) dropAddChange(files);
  });
  document.getElementById("reset").addEventListener("click", resetAll);
  document.getElementById("saveProject").addEventListener("click", saveProject);
  const openInput = document.getElementById("openProjectInput");
  document.getElementById("openProject").addEventListener("click", () => openInput.click());
  openInput.addEventListener("change", (e) => { openProjectFile(e.target.files[0]); e.target.value = ""; });

  function updateColTags() {
    document.querySelectorAll(".img-col.before .col-tag").forEach((e) => e.textContent = state.beforeLabel || "Before");
    document.querySelectorAll(".img-col.after .col-tag").forEach((e) => e.textContent = state.afterLabel || "After");
  }

  // ---------- tab + annotator wiring ----------
  document.querySelectorAll(".tab").forEach((b) => b.addEventListener("click", () => navTo(b.dataset.tab)));
  window.addEventListener("hashchange", () => showTab(tabFromHash() || currentTab));
  const annoFile = document.getElementById("annoFile");
  document.getElementById("annoBrowse").addEventListener("click", () => annoFile.click());
  document.getElementById("annoReplace").addEventListener("click", () => annoFile.click());
  annoFile.addEventListener("change", (e) => { loadAnnoFile(e.target.files[0]); e.target.value = ""; });
  const annoDrop = document.getElementById("annoDrop");
  annoDrop.addEventListener("dragover", (e) => { e.preventDefault(); annoDrop.classList.add("drag"); });
  annoDrop.addEventListener("dragleave", () => annoDrop.classList.remove("drag"));
  annoDrop.addEventListener("drop", (e) => { e.preventDefault(); annoDrop.classList.remove("drag"); loadAnnoFile(e.dataTransfer.files[0]); });

  // ---------- init ----------
  const restored = loadSaved();
  syncControls();
  buildBarActions();
  buildAnnoActions();
  buildEditor();
  if (restored) { hydrateImages(); hydrateAnno(); }
  // The URL hash (if any) wins over the saved tab — so a shared #/annotator link opens the right tool.
  const initialTab = tabFromHash() || currentTab;
  const wantHash = "#/" + TAB_SLUG[initialTab];
  if (location.hash !== wantHash) history.replaceState(null, "", wantHash);   // canonicalize without adding history
  showTab(initialTab);
  drawPreview();
})();
</script>
</body>
</html>
